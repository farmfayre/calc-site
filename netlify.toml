# Farm Fayre calc-site Netlify configuration
# Server-side calc v3 — raw price data never leaves the function.

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["_data/**"]

# API routes — all go to the same function, routed by path
[[redirects]]
  from = "/api/breeds"
  to = "/.netlify/functions/prices"
  status = 200

[[redirects]]
  from = "/api/price"
  to = "/.netlify/functions/prices"
  status = 200

[[redirects]]
  from = "/api/compare"
  to = "/.netlify/functions/prices"
  status = 200

# Block retired endpoints
[[redirects]]
  from = "/api/prices"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/market_data.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/_data/*"
  to = "/404.html"
  status = 404
  force = true
